name: Build Jshop CIA

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependências 3DS
        run: |
          dkp-pacman -Syu --noconfirm
          dkp-pacman -S --noconfirm \
            3ds-dev \
            3ds-curl \
            3ds-bzip2 \
            3ds-libarchive \
            3ds-liblzma \
            3ds-libzstd

      - name: Instalar bannertool
        run: |
          wget https://github.com/Steveice10/bannertool/releases/download/1.2.0/bannertool-linux-x86_64.zip
          unzip bannertool-linux-x86_64.zip -d /tmp/bannertool
          cp /tmp/bannertool/linux-x86_64/bannertool $DEVKITARM/bin/bannertool
          chmod +x $DEVKITARM/bin/bannertool

      - name: Instalar makerom
        run: |
          wget https://github.com/3DSGuy/Project_CTR/releases/download/makerom-v0.18.4/makerom-v0.18.4-ubuntu_x86_64.zip
          unzip makerom-v0.18.4-ubuntu_x86_64.zip -d /tmp/makerom
          cp /tmp/makerom/makerom $DEVKITARM/bin/makerom
          chmod +x $DEVKITARM/bin/makerom

      - name: Build
        run: make

      - name: Upload CIA (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Jshop.cia
          path: Jshop.cia

      - name: Upload 3DSX (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Jshop.3dsx
          path: Jshop.3dsx

      # Publica no Release automaticamente quando for uma tag
      - name: Upload para Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Jshop.cia
            Jshop.3dsx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
