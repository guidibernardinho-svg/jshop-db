name: Build Jshop CIA

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup devkitPro
        uses: devkitpro/pacman-action@v1.0.3
        with:
          packages: >-
            3ds-dev
            3ds-curl
            3ds-bzip2
            3ds-libarchive
            3ds-liblzma
            3ds-libzstd

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libmbedtls-dev \
            libbz2-dev \
            liblzma-dev \
            libyaml-dev \
            zlib1g-dev \
            pkg-config

      - name: Instalar bannertool
        run: |
          git clone https://github.com/Steveice10/bannertool.git
          cd bannertool
          make
          sudo cp output/linux-x86_64/bannertool /usr/local/bin/bannertool

      - name: Instalar makerom
        run: |
          git clone https://github.com/3DSGuy/Project_CTR.git
          cd Project_CTR/makerom
          make
          sudo cp makerom /usr/local/bin/makerom

      - name: Build
        run: |
          export PATH=$DEVKITPRO/tools/bin:$DEVKITARM/bin:$PATH
          make

      - name: Upload CIA
        uses: actions/upload-artifact@v4
        with:
          name: Jshop.cia
          path: Jshop.cia

      - name: Upload 3DSX
        uses: actions/upload-artifact@v4
        with:
          name: Jshop.3dsx
          path: Jshop.3dsx

      - name: Upload para Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Jshop.cia
            Jshop.3dsx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
