name: Build Jshop CIA

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Instalar dependências do sistema
        run: |
          apt-get update
          apt-get install -y \
            build-essential \
            git \
            cmake \
            libmbedtls-dev \
            libbz2-dev \
            liblzma-dev \
            libyaml-dev \
            zlib1g-dev \
            pkg-config

      - name: Instalar dependências 3DS
        run: |
          dkp-pacman -Syu --noconfirm
          dkp-pacman -S --noconfirm \
            3ds-dev \
            3ds-curl \
            3ds-bzip2 \
            3ds-libarchive \
            3ds-liblzma \
            3ds-libzstd

      - name: Instalar bannertool
        run: |
          git clone https://github.com/Steveice10/bannertool.git
          cd bannertool
          make
          cp output/linux-x86_64/bannertool /usr/local/bin/bannertool
          chmod +x /usr/local/bin/bannertool
          bannertool 2>&1 | head -1

      - name: Instalar makerom
        run: |
          git clone https://github.com/3DSGuy/Project_CTR.git
          cd Project_CTR/makerom
          make
          cp makerom /usr/local/bin/makerom
          chmod +x /usr/local/bin/makerom
          makerom 2>&1 | head -1

      - name: Build
        run: make

      - name: Upload CIA
        uses: actions/upload-artifact@v4
        with:
          name: Jshop.cia
          path: Jshop.cia

      - name: Upload 3DSX
        uses: actions/upload-artifact@v4
        with:
          name: Jshop.3dsx
          path: Jshop.3dsx

      - name: Upload para Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Jshop.cia
            Jshop.3dsx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
