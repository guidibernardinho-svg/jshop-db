name: Build Jshop CIA

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependências 3DS
        run: |
          dkp-pacman -Syu --noconfirm
          dkp-pacman -S --noconfirm \
            3ds-dev \
            3ds-curl \
            3ds-bzip2 \
            3ds-libarchive \
            3ds-liblzma \
            3ds-libzstd

      - name: Instalar bannertool (compilar do source)
        run: |
          apt-get update && apt-get install -y cmake build-essential
          git clone https://github.com/carstene1ns/3ds-bannertool bannertool
          cd bannertool
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          cp build/bannertool /usr/local/bin/bannertool
          chmod +x /usr/local/bin/bannertool

      - name: Instalar makerom (compilar do source)
        run: |
          git clone https://github.com/3DSGuy/Project_CTR makerom_src
          cd makerom_src/makerom
          make
          cp makerom /usr/local/bin/makerom
          chmod +x /usr/local/bin/makerom

      - name: Build
        run: make

      - name: Upload CIA
        uses: actions/upload-artifact@v4
        with:
          name: Jshop.cia
          path: Jshop.cia

      - name: Upload 3DSX
        uses: actions/upload-artifact@v4
        with:
          name: Jshop.3dsx
          path: Jshop.3dsx

      - name: Upload para Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Jshop.cia
            Jshop.3dsx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
